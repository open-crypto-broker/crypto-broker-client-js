name: JS-Client Continuous Improvement

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  license-check:
    name: License Compliance
    permissions:
      contents: read # for checking out code
    uses: open-crypto-broker/.github/.github/workflows/license-compliance.yaml@main # nolint # zizmor: ignore[unpinned-uses]
    with:
      directory_to_scan: '.'

  build-and-test:
    name: Build and Test
    permissions:
      contents: read # for checking out code and submodules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: npm

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: '3.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI task from Taskfile (continuous integration)
        run: task ci
