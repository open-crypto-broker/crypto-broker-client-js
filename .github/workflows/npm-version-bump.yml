name: NPM Version Bump
on:
  workflow_dispatch:
    inputs:
      version:
        # Note: use prerelease to increase the counter, release to finalize version
        description: 'Version (pre(patch/minor/major), prerelease, release)'
        default: 'prerelease'
        required: true
        type: choice
        options:
          - prepatch
          - preminor
          - premajor
          - prerelease
          - release

permissions: {}

jobs:
  bump-version:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment: DEPLOYMENT
    steps:
      - name: create github token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.DEPLOYMENT_SECRET }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Run version bump
        uses: open-crypto-broker/.github/actions/npm-version-bump@main # nolint # zizmor: ignore[unpinned-uses]
        with:
          version: ${{ inputs.version }}
